kind = "web"
previewPath = "/"
title = "Aniket Pandey Portfolio"
version = "1.0.0"
id = "artifacts/aniket-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25803

[services.development]
run = "pnpm --filter @workspace/aniket-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aniket-portfolio", "run", "build" ]
publicDir = "artifacts/aniket-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25803"
BASE_PATH = "/"
